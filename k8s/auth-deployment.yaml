apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: microservices-secure-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: 632127306880.dkr.ecr.ap-south-1.amazonaws.com/auth-service:v1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        env:
        - name: APP_ENV
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: APP_ENV
        - name: AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: AUTH_TOKEN
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: microservices-secure-ns
spec:
  selector:
    app: auth-service
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8081
  type: ClusterIP
